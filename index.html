<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مطعم أيمن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root {
  --primary: #E8450A;
  --primary2: #FF6B35;
  --secondary: #FFB347;
  --bg: #FAF7F4;
  --bg2: #F2EDE8;
  --card: #FFFFFF;
  --text: #1C1208;
  --text2: #7A6555;
  --green: #0BA360;
  --red: #E53E3E;
  --blue: #2B6CB0;
  --border: rgba(232,69,10,0.15);
  --shadow: 0 4px 24px rgba(232,69,10,0.10);
  --radius: 16px;
}
.dark {
  --bg: #111118;
  --bg2: #1A1A28;
  --card: #1E1E30;
  --text: #F5F0FF;
  --text2: #9090B0;
  --border: rgba(255,107,53,0.2);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;transition:background 0.3s,color 0.3s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}
/* ======= SCREENS ======= */
.screen{display:none;}
.screen.active{display:block;}
/* ======= LANDING ======= */
.landing{min-height:100vh;position:relative;overflow:hidden;}
.landing-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1C0A00 0%,#3D1500 50%,#1C0A00 100%);z-index:0;}
.landing-bg::after{content:'';position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="40" fill="rgba(232,69,10,0.08)"/><circle cx="80" cy="80" r="50" fill="rgba(255,107,53,0.06)"/></svg>');background-size:cover;}
.landing-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;}
.landing-logo{width:90px;height:90px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:28px;box-shadow:0 8px 32px rgba(232,69,10,0.5);}
.landing-title{font-size:52px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:12px;text-shadow:0 4px 20px rgba(0,0,0,0.5);}
.landing-sub{font-size:15px;color:rgba(255,255,255,0.75);margin-bottom:48px;max-width:300px;line-height:1.7;}
.landing-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;}
.btn-land-main{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:18px;padding:18px;font-family:'Cairo',sans-serif;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 24px rgba(232,69,10,0.45);transition:all 0.2s;}
.btn-land-main:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(232,69,10,0.55);}
.btn-land-sec{background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.25);border-radius:18px;padding:18px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:600;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;}
.btn-land-sec:hover{background:rgba(255,255,255,0.18);}
/* ======= CUSTOMER APP ======= */
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
.app-header-title{font-size:17px;font-weight:900;color:var(--primary);}
.app-header-sub{font-size:11px;color:var(--text2);}/* rest of CSS unchanged... */
</style>
</head>
<body>

<!-- ===== LANDING ===== -->
<div id="screen-landing" class="screen active">
  <div class="landing">
    <div class="landing-bg"></div>
    <div class="landing-content">
      <!-- LOGO -->
      <div style="text-align:center;margin-bottom:20px">
  <div style="display:inline-block;background:linear-gradient(145deg,#1A0800,#2D1200);border:2px solid #FF6B35;border-radius:24px;padding:24px 40px;box-shadow:0 12px 40px rgba(232,69,10,0.5),inset 0 1px 0 rgba(255,107,53,0.2)">
    <div style="font-size:13px;letter-spacing:6px;color:#FF6B35;font-weight:600;margin-bottom:8px;font-family:Cairo,sans-serif">🥞 مطعم</div>
    <div style="font-size:52px;font-weight:900;color:#fff;line-height:1;font-family:Cairo,sans-serif;text-shadow:0 0 30px rgba(255,107,53,0.6)" id="landing-rest-logo">أيمن</div>
    <div style="width:60px;height:3px;background:linear-gradient(90deg,transparent,#FF6B35,transparent);margin:10px auto 0"></div>
  </div>
</div>
      <!-- اسم المطعم -->
      <div style="margin-bottom:6px">
        <div style="font-size:46px;font-weight:900;color:#fff;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,0.4)" id="landing-rest-name">مطعم أيمن</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="height:2px;width:40px;background:linear-gradient(90deg,transparent,#FF6B35)"></div>
        <span style="font-size:13px;color:#FFD166;font-weight:700;letter-spacing:2px">AYMAN RESTAURANT</span>
        <div style="height:2px;width:40px;background:linear-gradient(90deg,#FF6B35,transparent)"></div>
      </div>
      <p class="landing-sub" style="margin-top:16px">🥞 كريب • سندوتشات • مشروبات<br>تجربة طعام لا تُنسى تبدأ من هنا</p>
      <div class="landing-btns">
        <button class="btn-land-main" onclick="showScreen('screen-cust-auth')">اطلب الآن ←</button>
        <button class="btn-land-sec" onclick="goLogin()">دخول الموظفين</button>
      </div>
    </div>
  </div>
</div>

<!-- rest of HTML unchanged until the openWA function -->

<script>
// ============================================================
// FIREBASE
// ============================================================
const FB = 'https://ayman-restaurant-901a1-default-rtdb.firebaseio.com';

// ============================================================
// STATE
// ============================================================
let DB = {
  restaurant: { name:'مطعم أيمن', phone:'', address:'', currency:'جنيه', hours:'متاح الآن' },
  categories: [],
  items: [],
  orders: [],
  customers: [],
  notifications: []
};
// ... (rest of state and functions unchanged)

// دالة مركزية لفتح واتساب - تقرأ رقم المطعم من DB
function openWA(msg) {
  // اقرأ رقم المطعم من DB
  let phone = (DB.restaurant.phone || '201288737134').replace(/\D/g, '');
  // لو الرقم مصري يبدأ بـ 0، استبدل الصفر بمفتاح الدولة 20
  if (phone.startsWith('0')) phone = '20' + phone.slice(1);
  // لو مش فيه كود دولي، ضف 20
  if (!phone.startsWith('20')) phone = '20' + phone;
  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
}

// ============================================================
// FIREBASE SYNC
// ============================================================
async function fbLoad() {
  try {
    const r = await fetch(`${FB}/data.json`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    if (d) {
      DB.categories = d.categories || DB.categories;
      DB.items = d.items || DB.items;
      DB.orders = d.orders || DB.orders;
      DB.customers = d.customers || DB.customers;
      DB.notifications = d.notifications || DB.notifications;
      if (d.restaurant) {
        // دمج بيانات المطعم بدل استبدالها
        DB.restaurant = { ...DB.restaurant, ...d.restaurant };
      }
    }
    setSyncStatus('متصل ✓', true);
    saveLocal();
    return true;
  } catch(e) {
    setSyncStatus('غير متصل', false);
    loadLocal();
    return false;
  }
}

// (file continues unchanged)
</script>
</body>
</html>
